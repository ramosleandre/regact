name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Guard against Python 3.13 (editable .pth footgun)
        run: python -c "import sys; assert sys.version_info < (3, 13), 'regact requires Python < 3.13'"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Format check
        run: ruff format --check src tests

      - name: Typecheck
        run: mypy src

      - name: Test
        run: pytest -m "not live and not slow" -q
