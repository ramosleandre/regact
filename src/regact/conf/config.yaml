# Default research config. Override on the CLI, e.g.:
#   python -m regact.run_exp problem.name=arc_agi agent.name=claude \
#       problem.lifecycle=single_instance
agent:
  name: scripted
  model: null
problem:
  name: minigrid
  lifecycle: multi_instance
  obs_mode: raw
  info_mode: informative
  kwargs:
    env_id: MiniGrid-Empty-5x5-v0
features:
  - controller
execution: sequential
parallel_workers: 1
limits:
  keep_alive: 150
  max_moves: 2500
output_root: experiments
experiment_name: dev
