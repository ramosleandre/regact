# Default research config. Pick groups + override fields on the CLI, e.g.:
#   python -m regact.run_exp agent=claude problem=arc_agi
#   python -m regact.run_exp agent=codex problem=minigrid agent.args.reasoning_effort=high
defaults:
  - agent: scripted
  - problem: arc_agi
  - _self_

task_names: []          # empty = all games of the problem; e.g. 'task_names=[ls20]'
features:
  - controller
execution: sequential
parallel_workers: 1
limits:
  keep_alive: 350
  max_moves: 2500
  n_episodes: 1
  walltime_s: null      # wall-clock budget per game (seconds); null = no limit (override e.g. =3600)
  token_budget: null    # token budget per game; null = no limit
  env_step_budget: null # hard cap on env steps per env (anti-runaway). Single-instance: shared
                        # with the eval, so set it generously (e.g. 20000). null = no cap.
security:
  sandbox: auto         # auto | none | seatbelt | bwrap | apptainer — 'none' disables the sandbox
  deny_egress: true     # true = only the agent's declared hosts reachable (via a localhost proxy); blocks the rest
record_video: true      # record a video of the final controller eval (per game's render_frame)
shadow_replay: true    # re-score by replaying actions on a trusted env (anti-cheat; ~2x eval cost)
output_root: experiments
experiment_name: dev
